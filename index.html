<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P3TO ARCHIVE</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/711/711769.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root {
            --accent: #ff8c00;
            --bg: #020617;
            --card: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg: #f1f5f9;
            --card: rgba(255, 255, 255, 0.7);
            --text: #0f172a;
            --glass-border: rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); color: var(--text); 
            min-height: 100vh; overflow-x: hidden; width: 100%;
            -webkit-user-select: none; user-select: none;
        }

        /* BG ANIMATION */
        .bg-animate { position: fixed; inset: 0; z-index: -2; background: linear-gradient(45deg, #020617, #0f172a, #020617); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        /* DASHBOARD CONTAINER */
        #main-dashboard { 
            display: none; 
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 15px; /* Padding samping lebih kecil untuk HP */
        }

        /* NAVIGATION RESPONSIVE */
        .nav-glass { 
            background: var(--card); 
            backdrop-filter: blur(15px); 
            border: 1px solid var(--glass-border); 
            padding: 15px 20px; 
            border-radius: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px;
            gap: 10px;
        }

        /* LOGIN SECTION */
        #login-section { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        .login-glass { 
            background: var(--card); 
            backdrop-filter: blur(30px); 
            border: 1px solid var(--glass-border); 
            padding: 40px 25px; 
            border-radius: 35px; 
            width: 100%; 
            max-width: 380px; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* GALLERY GRID - INI KUNCINYA */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            width: 100%;
        }

        /* CARD */
        .card { 
            background: var(--card); 
            border-radius: 25px; 
            padding: 12px; 
            border: 1px solid var(--glass-border); 
            backdrop-filter: blur(10px);
            width: 100%;
        }
        .card img { 
            width: 100%; 
            aspect-ratio: 1/1; 
            object-fit: cover; 
            border-radius: 18px; 
        }

        /* FLOATING HUB - PINDAH KE BAWAH UNTUK MOBILE */
        .floating-hub { 
            position: fixed; 
            bottom: 25px; 
            right: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            z-index: 2000; 
        }
        .float-btn { 
            width: 50px; height: 50px; 
            border-radius: 15px; 
            background: var(--accent); 
            color: white; 
            display: flex; align-items: center; justify-content: center; 
            text-decoration: none; font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* INPUTS */
        .login-input { 
            width: 100%; 
            padding: 14px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); 
            border-radius: 12px; 
            color: white; 
            margin: 15px 0; 
            outline: none; 
        }

        .btn-neon { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 15px; 
            font-weight: 800; 
            cursor: pointer; 
            width: auto;
        }

        /* SETTINGS DRAWER MOBILE FULL */
        .settings-drawer { 
            position: fixed; right: -100%; top: 0; 
            width: 100%; max-width: 300px; 
            height: 100vh; background: var(--bg); 
            z-index: 2001; padding: 30px; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            border-left: 1px solid var(--glass-border);
        }
        .settings-drawer.active { right: 0; }

        /* KHUSUS HP (Screen < 600px) */
        @media (max-width: 600px) {
            .nav-glass { 
                flex-direction: column; 
                text-align: center; 
                padding: 15px;
            }
            .nav-glass div { width: 100%; display: flex; justify-content: center; gap: 5px; }
            .gallery { grid-template-columns: 1fr; } /* Satu kolom saja di HP agar besar */
            #uploadBox { flex-direction: column; padding: 15px; }
            #imgUrl { text-align: center; border-bottom: 1px solid var(--glass-border) !important; }
            .btn-neon { width: 100%; }
            h1 { font-size: 2.2rem !important; }
        }
    </style>
</head>
<body data-theme="dark">

    <div class="bg-animate"></div>

    <div class="settings-drawer" id="settingsDrawer">
        <h2 style="margin-bottom: 30px;">SETTINGS</h2>
        <div style="margin-bottom: 20px;">
            <p style="font-size: 0.7rem; margin-bottom: 10px; opacity: 0.6;">THEME MODE</p>
            <button class="btn-neon" style="width: 100%;" onclick="handleThemeChangeUI()">GANTI TEMA</button>
        </div>
        <div onclick="toggleSettings()" style="margin-top: 40px; color: var(--accent); cursor: pointer;">TUTUP</div>
    </div>

    <div class="floating-hub">
        <a href="https://discord.com/invite/aarURee5bH" target="_blank" class="float-btn"><i class="fa-brands fa-discord"></i></a>
        <button class="float-btn" style="background: var(--card); color: var(--text);" onclick="toggleSettings()"><i class="fa-solid fa-gear"></i></button>
    </div>

    <section id="login-section">
        <div class="login-glass">
            <h1 style="font-size: 2.8rem; font-weight: 900;">P3TO<span style="color:var(--accent);">.</span></h1>
            <input type="password" id="idInput" class="login-input" placeholder="ENTER PASSKEY">
            <button class="btn-neon" style="width: 100%;" onclick="handleLogin()">LOG IN</button>
        </div>
    </section>

    <main id="main-dashboard">
        <nav class="nav-glass">
            <div id="greeting" style="font-weight: 800;"></div>
            <div style="display:flex; gap:8px;">
                <button id="tutorialBtn" class="btn-neon" style="background:rgba(255,255,255,0.1); font-size: 0.8rem;" onclick="toggleTutorial()">PANDUAN</button>
                <button class="btn-neon" style="background:#ef4444; font-size: 0.8rem;" onclick="location.reload()">LOGOUT</button>
            </div>
        </nav>

        <div id="uploadBox" style="display:none; background:var(--card); border-radius:20px; border: 1px solid var(--glass-border); margin-bottom:20px; display:flex; gap:10px;">
            <input type="text" id="imgUrl" class="login-input" style="margin:0; background:transparent; border:none;" placeholder="Direct Link Image...">
            <button class="btn-neon" id="uploadBtn">UNGGAH</button>
        </div>

        <button class="btn-neon" style="width:100%; background: transparent; border: 1px solid var(--glass-border); margin-bottom: 25px;" onclick="downloadAllZip()" id="zipBtn">
            DOWNLOAD ALL ZIP
        </button>

        <div class="gallery" id="gallery"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCA14Xq6CKyiiqnVK16N_fOVl-njWewPLE",
            authDomain: "p3to-ecosystem.firebaseapp.com",
            projectId: "p3to-ecosystem",
            storageBucket: "p3to-ecosystem.firebasestorage.app",
            messagingSenderId: "49693011075",
            appId: "1:49693011075:web:aeedbfeef4dc979f7a7fb6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const USERS = {
            "Mizael2784": { name: "Mixo", role: "DEV", msg: "Halo Mixo" },
            "PEGASUS_GOAT": { name: "PEGASUS", role: "ADMIN", msg: "Halo Abdan" },
            "SENJU33": { name: "Senju", role: "ADMIN", msg: "Halo Senju" },
            "BersamaP3TO": { name: "Sahabat", role: "MEMBER", msg: "Halo Sahabat" }
        };

        let activeUser = null;

        // Anti Inspect
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; };

        window.toggleSettings = () => document.getElementById('settingsDrawer').classList.toggle('active');
        window.handleThemeChangeUI = () => {
            const current = document.body.getAttribute('data-theme');
            document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        };

        window.handleLogin = () => {
            const key = document.getElementById('idInput').value;
            if(USERS[key]) {
                activeUser = USERS[key];
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'block';
                document.getElementById('greeting').innerText = activeUser.msg;
                
                const upBox = document.getElementById('uploadBox');
                if(activeUser.role === 'MEMBER') {
                    upBox.style.display = 'none';
                } else {
                    upBox.style.display = 'flex';
                }
                loadGallery();
            } else { alert("Key Salah!"); }
        };

        function loadGallery() {
            const q = query(collection(db, "photos"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    const card = document.createElement('div');
                    card.className = 'card animate__animated animate__fadeInUp';
                    card.innerHTML = `
                        <img src="${data.imageUrl}">
                        <div style="margin-top:10px; display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:0.7rem; font-weight:800; color:var(--accent);">${data.uploader || 'USER'}</span>
                            <div style="display:flex; gap:5px;">
                                <button onclick="window.open('${data.imageUrl}')" style="background:none; border:1px solid var(--accent); color:var(--accent); border-radius:8px; padding:4px 8px; font-size:0.6rem; cursor:pointer;">HD</button>
                                ${activeUser.role === 'DEV' ? `<button onclick="window.deleteItem('${d.id}')" style="background:none; border:none; color:#ef4444; cursor:pointer;"><i class="fa-solid fa-trash"></i></button>` : ''}
                            </div>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            });
        }

        document.getElementById('uploadBtn').onclick = async () => {
            const url = document.getElementById('imgUrl').value;
            if(!url.includes('http')) return alert("Link salah!");
            await addDoc(collection(db, "photos"), { imageUrl: url, uploader: activeUser.name, createdAt: serverTimestamp() });
            document.getElementById('imgUrl').value = "";
        };

        window.deleteItem = async (id) => { if(confirm("Hapus?")) await deleteDoc(doc(db, "photos", id)); };

        window.downloadAllZip = async () => {
            const zip = new JSZip();
            const btn = document.getElementById('zipBtn');
            const images = document.querySelectorAll('.card img');
            if (images.length === 0) return alert("Kosong!");
            btn.innerText = "WAIT...";
            for(let i=0; i < images.length; i++) {
                try {
                    const res = await fetch(images[i].src);
                    const blob = await res.blob();
                    zip.file(`asset-${i+1}.jpg`, blob);
                } catch(e) {}
            }
            zip.generateAsync({type:"blob"}).then(c => {
                saveAs(c, "P3TO-Archive.zip");
                btn.innerText = "DOWNLOAD ALL ZIP";
            });
        };
    </script>
</body>
</html>
